version: '3'

services:
  mongo:
      image: mongo
      restart: always
      ports:
        - 27017:27017
      volumes:
        - wisper-reseller:/data/db
      environment:
        MONGO_INITDB_DATABASE: reseller
        MONGO_INITDB_ROOT_USERNAME: root
        MONGO_INITDB_ROOT_PASSWORD: root

  mongo-express:
    image: mongo-express
    depends_on:
      - mongo
    restart: always
    ports:
      - 4000:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: root
      ME_CONFIG_MONGODB_URL: mongodb://root:root@mongo:27017/

volumes:
  wisper-reseller: